<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Complaint Box - Red mailbox style with college branding -->
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE5A52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Box structure -->
  <g transform="translate(75, 50)">
    <!-- Main box -->
    <rect x="0" y="40" width="200" height="120" rx="8" fill="url(#boxGrad)"/>
    
    <!-- Box top rounded part -->
    <ellipse cx="100" cy="40" rx="100" ry="30" fill="url(#boxGrad)"/>
    
    <!-- Box opening slot -->
    <rect x="60" y="45" width="80" height="20" rx="4" fill="#333" opacity="0.9"/>
    
    <!-- Door/Flag on side -->
    <rect x="210" y="70" width="40" height="60" rx="6" fill="#D32F2F"/>
    <circle cx="215" cy="100" r="3" fill="#333"/>
    
    <!-- Decorative icon -->
    <text x="100" y="110" font-size="40" text-anchor="middle" dominant-baseline="middle">
      ✉️
    </text>
    
    <!-- College badge below -->
    <rect x="0" y="180" width="200" height="30" rx="6" fill="#00ABE4"/>
    <text x="100" y="202" font-size="13" font-weight="700" fill="white" text-anchor="middle">
      SECE Grievance Portal
    </text>
  </g>
</svg>