<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9F1FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ABE4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative upward arrow showing growth -->
  <g transform="translate(100, 120)">
    <!-- Vertical bar chart -->
    <rect x="20" y="80" width="25" height="40" fill="#00ABE4" opacity="0.6"/>
    <rect x="65" y="50" width="25" height="70" fill="#00ABE4" opacity="0.8"/>
    <rect x="110" y="20" width="25" height="100" fill="#00ABE4"/>
    
    <!-- Upward arrow -->
    <path d="M 150 100 L 150 20 M 130 40 L 150 20 L 170 40" 
          stroke="#00ABE4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Label -->
    <text x="75" y="-20" font-size="16" font-weight="600" fill="#00ABE4" text-anchor="middle">
      Grievances Tracked
    </text>
    
    <!-- College badge -->
    <rect x="0" y="120" width="200" height="35" rx="6" fill="#00ABE4" opacity="0.9"/>
    <text x="100" y="143" font-size="14" font-weight="700" fill="white" text-anchor="middle">
      Sri Eshwar College
    </text>
  </g>
</svg>